name: Deploy to AWS EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build
        run: npm run build
      
      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}
      
      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USER: ec2-user
        run: |
            echo "Testing SSH connection..."
            ssh -v $EC2_USER@$EC2_HOST 'echo "SSH works!"' || exit 1
            
            echo "Copying files..."
            scp -r dist/* $EC2_USER@$EC2_HOST:/tmp/build || exit 1
            
            echo "Deploying..."
            ssh $EC2_USER@$EC2_HOST 'sudo cp -r /tmp/build/* /usr/share/nginx/html/ && sudo chown -R nginx:nginx /usr/share/nginx/html && sudo systemctl reload nginx' || exit 1
            