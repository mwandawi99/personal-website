name: Deploy to AWS EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build
        run: npm run build
      
      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ vars.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "SSH key created"
          echo "EC2_HOST is: $EC2_HOST"
      
      - name: Add host to known_hosts
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
        run: |
          ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts 2>&1 || echo "ssh-keyscan failed, continuing..."
      
      - name: Deploy files
        env:
          SSH_KEY_PATH: ~/.ssh/deploy_key
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USER: ec2-user
        run: |
          scp -i $SSH_KEY_PATH -o StrictHostKeyChecking=no -r dist/* $EC2_USER@$EC2_HOST:/tmp/build
          ssh -i $SSH_KEY_PATH -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST 'sudo cp -r /tmp/build/* /usr/share/nginx/html/ && sudo systemctl reload nginx'
